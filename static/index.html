<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Найди себе друга!</h1>

        <form action="/pets/orders" method="POST">
            <label for="petType">Pet Type</label>
            <select id="petType" name="petType">
                <option value="cat">Cat</option>
                <option value="dog">Dog</option>
                <option value="tiger">Tiger</option>
            </select>
            <fieldset>
                <legend>Gender</legend>

                <input type="radio" id="boy" name="gender" value="boy">
                <label for="boy">Boy</label>

                <input type="radio" id="girl" name="gender" value="girl">
                <label for="girl">Girl</label>

                <input type="radio" id="none" name="gender" value="none" checked>
                <label for="none">None</label>
            </fieldset>

            <label for="eyeColor">Eye color</label>
            <input type="color" id="eyeColor" name="eyeColor" value="#ff0000">

            <br>

            <label for="tailLength">Tail Length</label>
            <input type="range" id="tailLength" name="tailLength" min="1" max="60" value="30">

            <br>

            <label for="name">Owner name</label>
            <input type="text" id="name" name="name" placeholder="Ilya">

            <br>

            <label for="dateOfBirth">Birthday Day</label>
            <input type="date" id="dateOfBirth" name="dateOfBirth">

            <br>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com">

            <br>

            <label for="phone">Phone number</label>
            <input type="tel" id="phone" name="phone" placeholder="+359885858585">

            <br>

            <input type="checkbox" id="rules" name="rules" value="true" checked>
            <label for="rules">I agree to the Terms and Conditions</label>

            <br>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </main>
</body>
</html>
